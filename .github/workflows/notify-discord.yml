name: Discord Mention Notification

on:
  issues:
    types: [assigned]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Mention
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_CONFIG: ${{ secrets.DISCORD_CONFIG }}
        with:
          script: |
            const issue = context.payload.issue;
            const config = JSON.parse(process.env.DISCORD_CONFIG);
            const assignees = issue.assignees.map(a => a.login);
            const labels = issue.labels.map(l => l.name);

            let mentions = [];

            if (assignees.length === 0 && labels.length === 0) return;

            // Assigneeなし・ラベルあり → ロールのみ
            if (assignees.length === 0) {
              mentions = labels
                .map(label => config.roles[label.toLowerCase()])
                .filter(Boolean)
                .map(id => `<@&${id}>`);

            // Assigneeあり・ラベルなし → 個人のみ
            } else if (labels.length === 0) {
              mentions = assignees
                .map(login => config.users[login]?.discordId)
                .filter(Boolean)
                .map(id => `<@${id}>`);

            // Assigneeあり・ラベルあり
            } else {
              for (const label of labels) {
                const assigneeRoles = assignees.map(login => config.users[login]?.role);

                // 同分野 → ロールのみ
                if (assigneeRoles.includes(label.toLowerCase())) {
                  const roleId = config.roles[label.toLowerCase()];
                  if (roleId) mentions.push(`<@&${roleId}>`);

                // 別分野 → 個人 + ロール
                } else {
                  assignees.forEach(login => {
                    const id = config.users[login]?.discordId;
                    if (id) mentions.push(`<@${id}>`);
                  });
                  const roleId = config.roles[label.toLowerCase()];
                  if (roleId) mentions.push(`<@&${roleId}>`);
                }
              }
              // 重複除去
              mentions = [...new Set(mentions)];
            }

            if (mentions.length === 0) return;

            await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                content: `${mentions.join(' ')} 新しいタスクがアサインされました！\n📌 **${issue.title}**\n🔗 ${issue.html_url}`
              })
            });