name: Discord Mention Notification

on:
  issues:
    types: [assigned]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Mention
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_CONFIG: ${{ secrets.DISCORD_CONFIG }}
        with:
          script: |
            const issue = context.payload.issue;
            const config = JSON.parse(process.env.DISCORD_CONFIG);

            const assignees = issue.assignees.map(a => a.login);
            const labels = issue.labels.map(l => l.name.toLowerCase());

            if (assignees.length === 0 && labels.length === 0) {
              core.info('No assignees or labels, skipping notification.');
              return;
            }

            const mentionSet = new Set();

            // 1. 担当者メンション（GitHubユーザー → Discordユーザー）
            for (const login of assignees) {
              const user = config.users[login];
              if (user?.discordId) {
                mentionSet.add(`<@${user.discordId}>`);
              }
            }

            // 2. ラベルに対応するロールメンション
            for (const label of labels) {
              const roleId = config.roles[label];
              if (roleId) {
                mentionSet.add(`<@&${roleId}>`);
              }
            }

            // 3. ラベルと担当者ロールの紐付け（必要なら）
            //   config.users[login].role と label が一致する場合だけ、そのロールをメンション
            for (const login of assignees) {
              const user = config.users[login];
              if (!user?.role) continue;

              const normalizedRole = user.role.toLowerCase();
              if (labels.includes(normalizedRole)) {
                const roleId = config.roles[normalizedRole];
                if (roleId) {
                  mentionSet.add(`<@&${roleId}>`);
                }
              }
            }

            const mentions = [...mentionSet];

            if (mentions.length === 0) {
              core.info('No valid Discord mentions resolved, skipping notification.');
              return;
            }

            const content = `${mentions.join(' ')} 新しいタスクがアサインされました！\n` +
                            `📌 **${issue.title}**\n` +
                            `🔗 ${issue.html_url}`;

            await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content })
            });
