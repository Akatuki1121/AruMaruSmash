name: Discord Mention Notification

on:
  issues:
    types: [opened, assigned, labeled]

concurrency:
  group: notify-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Mention
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_CONFIG: ${{ secrets.DISCORD_CONFIG }}
        with:
          script: |
            const issue = context.payload.issue;
            const config = JSON.parse(process.env.DISCORD_CONFIG);

            const assignees = issue.assignees.map(a => a.login);
            const labels = issue.labels.map(l => l.name.toLowerCase());

            if (assignees.length === 0 && labels.length === 0) {
              core.info('担当者・ラベルともになし。通知をスキップします。');
              return;
            }

            const mentionSet = new Set();

            for (const login of assignees) {
              const user = config.users[login];
              if (user?.discordId) {
                mentionSet.add(`<@${user.discordId}>`);
              }
            }

            for (const label of labels) {
              const roleId = config.roles[label];
              if (roleId) {
                mentionSet.add(`<@&${roleId}>`);
              }
            }

            const mentions = [...mentionSet];

            if (mentions.length === 0) {
              core.info('メンション対象なし。通知をスキップします。');
              return;
            }

            const content = `${mentions.join(' ')} 新しいタスクがアサインされました！\n` +
                            `📌 **${issue.title}**\n` +
                            `🔗 ${issue.html_url}`;

            await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content })
            });
